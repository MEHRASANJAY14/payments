<!DOCTYPE html>
<html>
<head>
  <title>Payment System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #1e3c72, #2a5298, #00c6ff, #0072ff);
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;
      color: white;
      text-align: center;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .header {
      padding: 30px 10px;
      font-size: 28px;
      font-weight: bold;
    }

    .clock {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 25px;
      margin: 15px;
      width: 260px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #ffffff;
      color: #0072ff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #0072ff;
      color: #fff;
    }

    .footer {
      margin-top: 40px;
      padding: 15px;
      font-size: 14px;
      opacity: 0.8;
    }

    @media(max-width:600px){
      .container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

<div class="header" id="greeting">Welcome</div>
<div class="clock" id="clock"></div>

<div class="container">

  <div class="card">
    <h3>👤 Add Customer</h3>
    <p>New customer entry kare</p>
    <a href="customer.html" class="btn">Open</a>
  </div>

  <div class="card">
    <h3>💸 Add Payment</h3>
    <p>Payment record kare</p>
    <a href="payment.html" class="btn">Open</a>
  </div>

  <div class="card">
    <h3>📊 Dashboard</h3>
    <p>Reports & analytics</p>
    <a href="#" class="btn">Coming Soon</a>
  </div>

</div>

<div class="footer">
  © 2026 Payment System | Made by You 🚀
</div>

<script>
  // Greeting
  const hour = new Date().getHours();
  let msg = "Welcome";

  if(hour < 12) msg = "Good Morning ☀️";
  else if(hour < 18) msg = "Good Afternoon 🌤️";
  else msg = "Good Evening 🌙";

  document.getElementById("greeting").innerText = msg + " - Payment System";

  // Live Clock
  function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString();
    document.getElementById("clock").innerText = "⏰ " + time;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>

</body>
</html>
