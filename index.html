<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Payment System</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f2f4f8;
}

/* HEADER STRIP */
.header {
  position:fixed;
  top:0;
  width:100%;
  background:#0f2a5f;
  color:#fff;
  padding:10px;
  text-align:center;
  z-index:1000;
}

.header h2 {
  margin:0;
  font-size:16px;
}

.sub {
  font-size:11px;
}

.time {
  font-size:12px;
}

/* CONTENT AREA */
.container {
  margin-top:80px;
  margin-bottom:80px;
  padding:10px;
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
}

/* CARDS */
.card {
  background:#fff;
  padding:20px 10px;
  border-radius:15px;
  text-align:center;
  font-size:14px;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.05);
}

/* FOOTER STRIP */
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f2a5f;
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:12px;
}

.btn {
  display:inline-block;
  background:#fff;
  color:#333;
  padding:5px 12px;
  margin:3px;
  border-radius:10px;
  text-decoration:none;
  font-size:11px;
}

.small-text {
  font-size:10px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>💰 PAYMENT SYSTEM</h2>
  <div class="sub">Smart Entry</div>
  <div id="greeting"></div>
  <div class="time" id="time"></div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card" onclick="openPage('customer.html')">
    👤 Customer
  </div>

  <div class="card" onclick="openPage('payment.html')">
    💸 Payment
  </div>

  <div class="card" onclick="printReceipt()">
    🧾 Receipt
  </div>

  <div class="card" onclick="openPage('report.html')">
    📊 Report
  </div>

</div>

<!-- FOOTER -->
<div class="footer">

  <a href="index.html" class="btn">🏠 Home</a>
  <a href="" onclick="location.reload()" class="btn">🔄 Refresh</a>

  <div class="small-text">
    Developed & maintained and developed by Sanjay mehra
  </div>

</div>

<script>
// Greeting
const hour = new Date().getHours();
let msg = hour < 12 ? "☀️ Morning" : hour < 18 ? "🌤️ Afternoon" : "🌙 Evening";
document.getElementById("greeting").innerText = msg;

// Time
function updateTime(){
  const now = new Date();
  document.getElementById("time").innerText = now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

// Navigation
function openPage(page){
  window.location.href = page;
}

// Print Receipt
function printReceipt(){
  let id = prompt("Enter Transaction ID");
  if(id){
    window.location.href = "receipt.html?id=" + id;
  }
}
</script>

</body>
</html>
