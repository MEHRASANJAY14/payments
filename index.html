<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment System</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1c3c75, #3f63b5);
  color:white;
  text-align:center;
}

/* HEADER */
.header {
  padding:20px 10px;
}

.header h2 {
  margin:5px 0;
  font-size:18px;
  letter-spacing:1px;
}

.sub {
  font-size:13px;
  opacity:0.9;
}

.greeting {
  margin-top:10px;
  font-size:14px;
}

.datetime {
  font-weight:bold;
  margin-top:5px;
}

/* CARDS */
.container {
  margin-top:20px;
  padding:10px;
}

.card {
  background:#fff;
  color:#1c3c75;
  margin:15px auto;
  padding:25px;
  width:85%;
  border-radius:25px;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.icon {
  font-size:30px;
  margin-bottom:10px;
}

/* FOOTER */
.footer {
  margin-top:20px;
  padding:15px;
}

.btn {
  display:inline-block;
  background:#fff;
  color:#333;
  padding:8px 18px;
  margin:5px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}

.small {
  font-size:12px;
  margin-top:8px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <h2>💰 PAYMENT MANAGEMENT SYSTEM</h2>

  <div class="sub">
    Track Payments | Reports | Receipts
  </div>

  <div class="greeting" id="greeting"></div>

  <div class="datetime" id="datetime"></div>

  <div class="sub">
    Manage your payments easily and securely.
  </div>

</div>

<!-- CARDS -->
<div class="container">

  <div class="card" onclick="openPage('payment.html')">
    <div class="icon">💸</div>
    Add Payment
  </div>

  <div class="card" onclick="printReceipt()">
    <div class="icon">🧾</div>
    Print Receipt
  </div>

  <div class="card" onclick="openReport()">
    <div class="icon">📊</div>
    Generate Report
  </div>

</div>

<!-- FOOTER -->
<div class="footer">

  <a href="index.html" class="btn">🏠 Home</a>
  <a href="" onclick="location.reload()" class="btn">🔄 Refresh</a>

  <div class="small">
    © 2026 Payment System
  </div>

  <div class="small">
    maintained and developed by sanjay mehra
  </div>

</div>

<script>
// Greeting
let h = new Date().getHours();
let g = h<12 ? "🌅 Good Morning" : h<18 ? "🌤️ Good Afternoon" : "🌙 Good Evening";
document.getElementById("greeting").innerText = g;

// Date Time
function updateTime(){
  const now = new Date();
  document.getElementById("datetime").innerText =
    now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

// Navigation
function openPage(p){
  window.location.href = p;
}

// Receipt
function printReceipt(){
  let id = prompt("Enter Transaction ID");
  if(id){
    window.location.href = "receipt.html?id=" + id;
  }
}

// Report
function openReport(){
  window.location.href = "report.html";
}
</script>

</body>
</html>
