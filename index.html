<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment System</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f2f4f8;
}

/* HEADER */
.header {
  position:fixed;
  top:0;
  width:100%;
  background:linear-gradient(90deg,#0f2a5f,#3f63b5);
  color:#fff;
  padding:10px;
  text-align:center;
  z-index:1000;
}

/* CONTENT */
.container {
  margin-top:80px;
  margin-bottom:80px;
  padding:12px;
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
}

/* CARDS */
.card {
  background:#fff;
  padding:18px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  cursor:pointer;
}

/* FOOTER */
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f2a5f;
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:12px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.modal-content {
  background:#fff;
  margin:10% auto;
  padding:20px;
  width:90%;
  max-width:400px;
}

table {
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

td, th {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

</style>
</head>

<body>

<div class="header">
  <h3>💰 Payment System</h3>
</div>

<div class="container">

  <div class="card" onclick="openPage('payment.html')">💸 Add Payment</div>

  <div class="card" onclick="printReceipt()">🧾 Print Receipt</div>

  <div class="card" onclick="openReport()">📊 Generate Report</div>

  <div class="card" onclick="location.reload()">🔄 Refresh</div>

</div>

<div class="footer">
  maintained and developed by sanjay mehra
</div>

<!-- REPORT MODAL -->
<div class="modal" id="reportModal">
  <div class="modal-content">
    <h3>Report</h3>

    <input type="date" id="fromDate"><br><br>
    <input type="date" id="toDate"><br><br>

    <button onclick="loadReport()">Generate</button>
    <button onclick="closeReport()">Close</button>

    <div id="result"></div>
  </div>
</div>

<script>
const API = "https://opensheet.elk.sh/1imhirRNpRmDnxaTEANyCtcyr-IOt_PNXwVYUeDOWeBE/Payments";

// Navigation
function openPage(p){ window.location.href = p; }

// Receipt
function printReceipt(){
  let id = prompt("Enter Transaction ID");
  if(id){
    window.location.href = "receipt.html?id=" + id;
  }
}

// Open modal
function openReport(){
  document.getElementById("reportModal").style.display = "block";
}

// Close modal
function closeReport(){
  document.getElementById("reportModal").style.display = "none";
}

// Load report
function loadReport(){
  let from = new Date(document.getElementById("fromDate").value);
  let to = new Date(document.getElementById("toDate").value);

  fetch(API)
  .then(res => res.json())
  .then(data => {

    let html = "<table><tr><th>Date</th><th>Name</th><th>Amount</th></tr>";
    let total = 0;

    data.forEach(row => {
      let d = new Date(row["Date"]);

      if(d >= from && d <= to){
        total += Number(row["Amount"]);

        html += `<tr>
          <td>${row["Date"]}</td>
          <td>${row["Person Name"]}</td>
          <td>₹${row["Amount"]}</td>
        </tr>`;
      }
    });

    html += "</table>";
    html += "<h3>Total: ₹" + total + "</h3>";

    document.getElementById("result").innerHTML = html;
  });
}
</script>

</body>
</html>
