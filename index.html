<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment System</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(to bottom, #0f2a5f, #3f63b5);
  color:white;
  text-align:center;
}

/* HEADER */
.header {
  padding:20px;
}
.header h2 {
  margin:5px 0;
}
.sub {
  font-size:14px;
  opacity:0.9;
}
.time {
  margin-top:10px;
}

/* CARDS */
.container {
  margin-top:30px;
}

.card {
  background:#fff;
  color:#333;
  margin:15px auto;
  padding:25px;
  width:85%;
  border-radius:25px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

/* FOOTER */
.footer {
  margin-top:30px;
  padding:20px;
}

.btn {
  display:inline-block;
  background:#fff;
  color:#333;
  padding:10px 20px;
  margin:5px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
}

/* small footer text */
.small-text {
  font-size:12px;
  opacity:0.7;
  margin-top:10px;
  letter-spacing:1px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>💰 PAYMENT MANAGEMENT SYSTEM</h2>
  <div class="sub">Smart Entry & Tracking</div>

  <div id="greeting"></div>
  <div class="time" id="time"></div>
</div>

<!-- MAIN CARDS -->
<div class="container">

  <div class="card" onclick="openPage('customer.html')">
    👤 Add Customer
  </div>

  <div class="card" onclick="openPage('payment.html')">
    💸 Add Payment
  </div>

  <div class="card" onclick="printReceipt()">
    🧾 Print Receipt
  </div>

  <div class="card" onclick="openPage('report.html')">
    📊 Generate Report
  </div>

</div>

<!-- FOOTER -->
<div class="footer">

  <a href="index.html" class="btn">🏠 Home</a>
  <a href="" onclick="location.reload()" class="btn">🔄 Refresh</a>

  <p>© 2026 Payment System</p>

  <div class="small-text">
    maintained and developed by sanjay mehra
  </div>

</div>

<script>
// Greeting
const hour = new Date().getHours();
let msg = "Welcome";

if(hour < 12) msg = "☀️ Good Morning";
else if(hour < 18) msg = "🌤️ Good Afternoon";
else msg = "🌙 Good Evening";

document.getElementById("greeting").innerText = msg;

// Live Time
function updateTime(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

// Navigation
function openPage(page){
  window.location.href = page;
}

// Print Receipt
function printReceipt(){
  let id = prompt("Enter Transaction ID");
  if(id){
    window.location.href = "receipt.html?id=" + id;
  }
}
</script>

</body>
</html>
