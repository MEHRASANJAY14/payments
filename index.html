<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment System</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(to bottom, #0f2a5f, #3f63b5);
  color:white;
  text-align:center;
}

/* HEADER */
.header {
  padding:15px;
}
.header h2 {
  margin:5px 0;
  font-size:18px;
}
.sub {
  font-size:12px;
  opacity:0.9;
}
.time {
  margin-top:5px;
  font-size:13px;
}

/* GRID LAYOUT */
.container {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
  padding:15px;
}

/* SMALL CARDS */
.card {
  background:#fff;
  color:#333;
  padding:15px;
  border-radius:15px;
  box-shadow:0 5px 12px rgba(0,0,0,0.3);
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.05);
}

/* FOOTER */
.footer {
  margin-top:10px;
  padding:15px;
}

.btn {
  display:inline-block;
  background:#fff;
  color:#333;
  padding:8px 15px;
  margin:5px;
  border-radius:15px;
  text-decoration:none;
  font-size:13px;
}

.small-text {
  font-size:11px;
  opacity:0.7;
  margin-top:8px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>💰 PAYMENT SYSTEM</h2>
  <div class="sub">Smart Entry & Tracking</div>

  <div id="greeting"></div>
  <div class="time" id="time"></div>
</div>

<!-- COMPACT GRID -->
<div class="container">

  <div class="card" onclick="openPage('customer.html')">
    👤 Customer
  </div>

  <div class="card" onclick="openPage('payment.html')">
    💸 Payment
  </div>

  <div class="card" onclick="printReceipt()">
    🧾 Receipt
  </div>

  <div class="card" onclick="openPage('report.html')">
    📊 Report
  </div>

</div>

<!-- FOOTER -->
<div class="footer">

  <a href="index.html" class="btn">🏠 Home</a>
  <a href="" onclick="location.reload()" class="btn">🔄 Refresh</a>

  <div class="small-text">
    maintained and developed by sanjay mehra
  </div>

</div>

<script>
// Greeting
const hour = new Date().getHours();
let msg = hour < 12 ? "☀️ Good Morning" : hour < 18 ? "🌤️ Good Afternoon" : "🌙 Good Evening";
document.getElementById("greeting").innerText = msg;

// Time
function updateTime(){
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

// Navigation
function openPage(page){
  window.location.href = page;
}

// Print
function printReceipt(){
  let id = prompt("Enter Transaction ID");
  if(id){
    window.location.href = "receipt.html?id=" + id;
  }
}
</script>

</body>
</html>
