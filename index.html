<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment System</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #1e3c72, #2a5298, #00c6ff, #0072ff);
  background-size: 400% 400%;
  animation: gradient 10s ease infinite;
  color:white;
}

/* Animated BG */
@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* HEADER */
.header {
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:12px;
  backdrop-filter: blur(10px);
}

.header h2 {
  margin:0;
  font-size:18px;
}

.time {
  font-size:12px;
}

/* CONTENT */
.container {
  margin-top:90px;
  margin-bottom:80px;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:15px;
  padding:15px;
}

/* GLASS CARDS */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  padding:20px;
  border-radius:20px;
  text-align:center;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-5px) scale(1.05);
}

/* FOOTER */
.footer {
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  padding:10px;
  backdrop-filter: blur(10px);
  font-size:12px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-box {
  background:#fff;
  color:#000;
  padding:20px;
  margin:15% auto;
  width:90%;
  max-width:400px;
  border-radius:15px;
}

input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

table {
  width:100%;
  margin-top:10px;
  border-collapse: collapse;
}

td, th {
  border:1px solid #ccc;
  padding:5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>💰 Payment System</h2>
  <div id="greeting"></div>
  <div class="time" id="time"></div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card" onclick="openPage('payment.html')">
    💸 Add Payment
  </div>

  <div class="card" onclick="printReceipt()">
    🧾 Receipt
  </div>

  <div class="card" onclick="openReport()">
    📊 Report
  </div>

  <div class="card" onclick="location.reload()">
    🔄 Refresh
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  maintained and developed by sanjay mehra
</div>

<!-- REPORT MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>📊 Report</h3>

    <input type="date" id="from">
    <input type="date" id="to">

    <button onclick="loadReport()">Generate</button>
    <button onclick="closeModal()">Close</button>

    <div id="output"></div>
  </div>
</div>

<script>
const API = "https://opensheet.elk.sh/1imhirRNpRmDnxaTEANyCtcyr-IOt_PNXwVYUeDOWeBE/Payments";

// Greeting
let h = new Date().getHours();
let g = h<12?"☀️ Morning":h<18?"🌤️ Afternoon":"🌙 Evening";
document.getElementById("greeting").innerText = g;

// Time
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);

// Navigation
function openPage(p){ window.location.href=p; }

// Receipt
function printReceipt(){
  let id = prompt("Enter Transaction ID");
  if(id) window.location.href="receipt.html?id="+id;
}

// Modal
function openReport(){ document.getElementById("modal").style.display="block"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

// Report
function loadReport(){
  let f = new Date(document.getElementById("from").value);
  let t = new Date(document.getElementById("to").value);

  fetch(API).then(r=>r.json()).then(data=>{
    let total=0;
    let html="<table><tr><th>Date</th><th>Name</th><th>₹</th></tr>";

    data.forEach(x=>{
      let d=new Date(x["Date"]);
      if(d>=f && d<=t){
        total+=Number(x["Amount"]);
        html+=`<tr><td>${x["Date"]}</td><td>${x["Person Name"]}</td><td>${x["Amount"]}</td></tr>`;
      }
    });

    html+="</table><h3>Total ₹"+total+"</h3>";
    document.getElementById("output").innerHTML=html;
  });
}
</script>

</body>
</html>
