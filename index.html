<!DOCTYPE html>
<html>
<head>
  <title>Payment System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      text-align: center;
    }

    .header {
      padding: 30px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }

    .card {
      background: #fff;
      color: #333;
      width: 250px;
      margin: 15px;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #007bff;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
    }

    .footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
    }

    @media(max-width:600px){
      .container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

<div class="header">
  💰 Payment Management System
</div>

<div class="container">

  <div class="card">
    <h3>👤 Add Customer</h3>
    <p>New customer entry kare</p>
    <a href="customer.html" class="btn">Open</a>
  </div>

  <div class="card">
    <h3>💸 Add Payment</h3>
    <p>Payment record kare</p>
    <a href="payment.html" class="btn">Open</a>
  </div>

  <div class="card">
    <h3>📊 Dashboard</h3>
    <p>Total aur report dekhe</p>
    <a href="#" class="btn">Coming Soon</a>
  </div>

</div>

<div class="footer">
  © 2026 Payment System | Made by You 🚀
</div>

<script>
  // Simple dynamic greeting
  const hour = new Date().getHours();
  let msg = "Welcome";

  if(hour < 12) msg = "Good Morning ☀️";
  else if(hour < 18) msg = "Good Afternoon 🌤️";
  else msg = "Good Evening 🌙";

  document.querySelector(".header").innerHTML = msg + "<br>💰 Payment Management System";
</script>

</body>
</html>
