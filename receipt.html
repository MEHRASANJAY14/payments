<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment Receipt</title>

<style>
body {
  font-family:'Segoe UI', sans-serif;
  background:#eef1f5;
  margin:0;
  padding:20px;
}

/* CARD */
.receipt {
  max-width:420px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  padding:20px;
}

/* HEADER */
.header {
  text-align:center;
  border-bottom:2px dashed #ccc;
  padding-bottom:10px;
  margin-bottom:15px;
}

.header h2 {
  margin:0;
  color:#1c3c75;
}

/* ROW */
.row {
  display:flex;
  justify-content:space-between;
  margin:10px 0;
  font-size:15px;
}

.label {
  color:#666;
  font-weight:600;
}

.value {
  font-weight:bold;
  color:#000;
}

/* AMOUNT */
.amount {
  color:#007bff;
  font-size:20px;
}

/* FOOTER */
.footer {
  text-align:center;
  margin-top:15px;
  border-top:2px dashed #ccc;
  padding-top:10px;
  font-size:12px;
  color:#666;
}

/* BUTTON */
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
  font-size:16px;
}

.print-btn {
  background:#27457a;
  color:#fff;
}

.back-btn {
  background:#ddd;
}

/* PRINT */
@media print {
  .btn { display:none; }
  body { background:#fff; }
  .receipt { box-shadow:none; }
}
</style>
</head>

<body>

<div class="receipt">

  <div class="header">
    <h2>🧾 Payment Receipt</h2>
  </div>

  <div id="receipt">Loading...</div>

  <div class="footer">
    This is system generated<br>
    <span id="todayDate"></span>
  </div>

</div>

<button class="btn print-btn" onclick="window.print()">🖨️ Print</button>
<button class="btn back-btn" onclick="goHome()">⬅ Back</button>

<script>
const params = new URLSearchParams(window.location.search);
const txnId = params.get("id");

const API = "https://opensheet.elk.sh/1imhirRNpRmDnxaTEANyCtcyr-IOt_PNXwVYUeDOWeBE/Payments";

// TODAY DATE FORMAT
function formatToday(){
  let d = new Date();
  let day = String(d.getDate()).padStart(2,'0');
  let month = d.toLocaleString('en-IN',{month:'short'});
  let year = d.getFullYear();
  return day + "-" + month + "-" + year;
}
document.getElementById("todayDate").innerText = formatToday();

// FORMAT PAYMENT DATE
function formatDate(value){
  if(!value) return "-";

  let d = new Date(value);

  let day = String(d.getDate()).padStart(2,'0');
  let month = d.toLocaleString('en-IN',{month:'short'});
  let year = d.getFullYear();

  return day + "-" + month + "-" + year;
}

// FETCH DATA
fetch(API)
.then(res => res.json())
.then(data => {

  let row = data.find(r => r["Transaction ID"] === txnId);

  if(!row){
    document.getElementById("receipt").innerHTML = "❌ Receipt Not Found";
    return;
  }

  // SAFE COLUMN FETCH
  function getValue(key){
    let foundKey = Object.keys(row).find(k => k.trim() === key);
    return foundKey ? row[foundKey] : "-";
  }

  document.getElementById("receipt").innerHTML = `
    <div class="row"><span class="label">Txn ID</span><span class="value">${getValue("Transaction ID")}</span></div>
    <div class="row"><span class="label">Name</span><span class="value">${getValue("Person Name")}</span></div>
    <div class="row"><span class="label">Amount</span><span class="value amount">₹${getValue("Amount")}</span></div>
    <div class="row"><span class="label">Mode</span><span class="value">${getValue("Mode")}</span></div>
    <div class="row"><span class="label">Purpose</span><span class="value">${getValue("Purpose")}</span></div>
    <div class="row"><span class="label">Receiver</span><span class="value">${getValue("Receiver Type")}</span></div>
    <div class="row"><span class="label">Payment Date</span><span class="value">${formatDate(getValue("Payment Date"))}</span></div>
    <div class="row"><span class="label">Status</span><span class="value">${getValue("Status")}</span></div>
  `;
});

// BACK
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
