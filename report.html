<!DOCTYPE html>
<html>
<head>
<title>Payment Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family:'Segoe UI', sans-serif;
  background:#f2f5f9;
  padding:15px;
}

h2 {
  text-align:center;
  color:#1c3c75;
}

/* INPUT */
input, button {
  padding:12px;
  margin:6px 0;
  width:100%;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#1c3c75;
  color:#fff;
  font-weight:bold;
}

/* TABLE */
table {
  width:100%;
  border-collapse: collapse;
  margin-top:15px;
  background:#fff;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th {
  background:#1c3c75;
  color:#fff;
}

.total {
  margin-top:10px;
  font-weight:bold;
  text-align:right;
  font-size:16px;
}
</style>
</head>

<body>

<h2>📊 Payment Report</h2>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<input type="text" id="nameSearch" placeholder="Search by Name">
<input type="number" id="amountSearch" placeholder="Search by Amount">

<button onclick="loadReport()">Generate Report</button>

<div id="result"></div>

<script>
const API = "https://opensheet.elk.sh/1imhirRNpRmDnxaTEANyCtcyr-IOt_PNXwVYUeDOWeBE/Payments";

// DATE PARSE
function parseDate(value){
  if(!value) return null;

  let clean = value.split(" ")[0];
  let parts = clean.split(/[\/\-]/);

  if(parts.length < 3) return null;

  let day = parseInt(parts[0]);
  let month = parseInt(parts[1]) - 1;
  let year = parseInt(parts[2]);

  return new Date(year, month, day);
}

// SAFE GET
function getValue(row, key){
  let foundKey = Object.keys(row).find(k => k.trim() === key);
  return foundKey ? row[foundKey] : "";
}

function loadReport(){

  let fromVal = document.getElementById("fromDate").value;
  let toVal = document.getElementById("toDate").value;

  let nameSearch = document.getElementById("nameSearch").value.toLowerCase();
  let amountSearch = document.getElementById("amountSearch").value;

  fetch(API)
  .then(res => res.json())
  .then(data => {

    let html = `
      <table>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Amount</th>
          <th>Mode</th>
        </tr>
    `;

    let total = 0;

    data.forEach(row => {

      let dateStr = getValue(row, "Payment Date");
      let d = parseDate(dateStr);

      if(!d) return;

      // DATE FILTER
      if(fromVal && toVal){
        let from = new Date(fromVal);
        let to = new Date(toVal);

        if(!(d >= from && d <= to)) return;
      }

      // NAME FILTER
      let name = getValue(row,"Person Name").toLowerCase();
      if(nameSearch && !name.includes(nameSearch)) return;

      // AMOUNT FILTER
      let amt = Number(getValue(row,"Amount")) || 0;
      if(amountSearch && amt != amountSearch) return;

      total += amt;

      html += `
      <tr>
        <td>${dateStr}</td>
        <td>${getValue(row,"Person Name")}</td>
        <td>₹${amt}</td>
        <td>${getValue(row,"Mode")}</td>
      </tr>`;
    });

    html += "</table>";

    html += `<div class="total">Total Amount: ₹${total}</div>`;

    document.getElementById("result").innerHTML = html;
  });
}
</script>

</body>
</html>
