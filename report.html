<!DOCTYPE html>
<html>
<head>
<title>Payment Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family:'Segoe UI', sans-serif;
  background:#eef1f5;
  padding:15px;
}

h2 {
  text-align:center;
  color:#1c3c75;
}

input, button {
  padding:12px;
  margin:6px 0;
  width:100%;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  background:#27457a;
  color:#fff;
  font-weight:bold;
}

/* TABLE */
table {
  width:100%;
  border-collapse: collapse;
  margin-top:15px;
  background:#fff;
  font-size:12px;
}

th, td {
  padding:8px;
  border:1px solid #ddd;
  text-align:center;
}

th {
  background:#27457a;
  color:#fff;
}

.table-container {
  overflow-x:auto;
}

.range {
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

.total {
  margin-top:10px;
  font-weight:bold;
  text-align:right;
}

.nodata {
  text-align:center;
  margin-top:20px;
}

/* PRINT */
@media print {
  button, input {
    display:none;
  }
}
</style>
</head>

<body>

<h2>📊 Payment Report</h2>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<input type="text" id="nameSearch" placeholder="Search by Name">
<input type="number" id="amountSearch" placeholder="Search by Amount">

<button onclick="loadReport()">Generate Report</button>
<button onclick="window.print()">🖨️ Print</button>
<button onclick="goHome()">⬅ Back</button>

<div id="result"></div>

<script>
const API = "https://opensheet.elk.sh/1imhirRNpRmDnxaTEANyCtcyr-IOt_PNXwVYUeDOWeBE/Payments";

// FORMAT DATE
function formatDisplayDate(val){
  let p = val.split("-");
  let m = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${p[2]}-${m[p[1]-1]}-${p[0]}`;
}

// INPUT DATE
function convertInputDate(val){
  if(!val) return null;
  let p = val.split("-");
  return new Date(p[0], p[1]-1, p[2]);
}

// SHEET DATE
function parseDate(value){
  if(!value) return null;
  let clean = value.split(" ")[0];
  let p = clean.split("/");
  return new Date(p[2], p[1]-1, p[0]);
}

// SAFE GET
function getValue(row, key){
  let k = Object.keys(row).find(x => x.trim() === key);
  return k ? row[k] : "";
}

// BACK
function goHome(){
  window.location.href = "index.html";
}

function loadReport(){

  let fromVal = document.getElementById("fromDate").value;
  let toVal = document.getElementById("toDate").value;

  let nameSearch = document.getElementById("nameSearch").value.toLowerCase();
  let amountSearch = document.getElementById("amountSearch").value;

  let from = convertInputDate(fromVal);
  let to = convertInputDate(toVal);

  if(to) to.setHours(23,59,59,999);

  fetch(API)
  .then(res => res.json())
  .then(data => {

    let range = "";
    if(fromVal && toVal){
      range = `<div class="range">Date Range: ${formatDisplayDate(fromVal)} to ${formatDisplayDate(toVal)}</div>`;
    }

    let html = range + `<div class="table-container"><table>
      <tr>
        <th>Sr No</th>
        <th>Payment Date</th>
        <th>Name</th>
        <th>Mode</th>
        <th>Purpose</th>
        <th>Receiver</th>
        <th>Status</th>
        <th>Remarks</th>
        <th>Txn ID</th>
        <th>Amount</th>
      </tr>`;

    let total = 0;
    let count = 0;
    let sr = 1;

    data.forEach(row => {

      let dateStr = getValue(row,"Payment Date");
      let d = parseDate(dateStr);

      if(!d) return;

      if(from && to && (d < from || d > to)) return;

      let name = getValue(row,"Person Name").toLowerCase();
      if(nameSearch && !name.includes(nameSearch)) return;

      let amt = Number(getValue(row,"Amount")) || 0;
      if(amountSearch && amt != amountSearch) return;

      total += amt;
      count++;

      html += `
      <tr>
        <td>${sr++}</td>
        <td>${dateStr.split(" ")[0]}</td>
        <td>${getValue(row,"Person Name")}</td>
        <td>${getValue(row,"Mode")}</td>
        <td>${getValue(row,"Purpose")}</td>
        <td>${getValue(row,"Receiver Type")}</td>
        <td>${getValue(row,"Status")}</td>
        <td>${getValue(row,"Remarks")}</td>
        <td>${getValue(row,"Transaction ID")}</td>
        <td>₹${amt}</td>
      </tr>`;
    });

    html += "</table></div>";

    if(count === 0){
      document.getElementById("result").innerHTML = "<div class='nodata'>❌ No Data Found</div>";
      return;
    }

    html += `<div class="total">Total Amount: ₹${total}</div>`;

    document.getElementById("result").innerHTML = html;
  });
}
</script>

</body>
</html>
