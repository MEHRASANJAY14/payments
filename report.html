<!DOCTYPE html>
<html>
<head>
<title>Payment Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family:'Segoe UI', sans-serif;
  background:#eef1f5;
  padding:15px;
}

h2 {
  text-align:center;
  color:#1c3c75;
}

/* INPUT */
input, button {
  padding:12px;
  margin:6px 0;
  width:100%;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

button {
  background:#27457a;
  color:#fff;
  font-weight:bold;
}

/* DATE RANGE */
.range {
  text-align:center;
  font-weight:bold;
  margin-top:10px;
}

/* TABLE */
table {
  width:100%;
  border-collapse: collapse;
  margin-top:15px;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th {
  background:#27457a;
  color:#fff;
}

.total {
  margin-top:10px;
  font-weight:bold;
  text-align:right;
  font-size:16px;
}

.nodata {
  text-align:center;
  margin-top:20px;
  font-weight:bold;
  color:#777;
}

/* PRINT */
@media print {
  button, input {
    display:none;
  }
  body {
    background:#fff;
  }
}
</style>
</head>

<body>

<h2>📊 Payment Report</h2>

<input type="date" id="fromDate">
<input type="date" id="toDate">

<input type="text" id="nameSearch" placeholder="Search by Name">
<input type="number" id="amountSearch" placeholder="Search by Amount">

<button onclick="loadReport()">Generate Report</button>
<button onclick="printReport()">🖨️ Print Report</button>
<button onclick="goHome()">⬅ Back</button>

<div id="result"></div>

<script>
const API = "https://opensheet.elk.sh/1imhirRNpRmDnxaTEANyCtcyr-IOt_PNXwVYUeDOWeBE/Payments";

// FORMAT DATE FOR DISPLAY
function formatDisplayDate(val){
  let parts = val.split("-");
  let year = parts[0];
  let month = parts[1];
  let day = parts[2];

  let monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  return `${day}-${monthNames[parseInt(month)-1]}-${year}`;
}

// INPUT DATE
function convertInputDate(val){
  if(!val) return null;
  let parts = val.split("-");
  return new Date(parts[0], parts[1]-1, parts[2]);
}

// SHEET DATE
function parseDate(value){
  if(!value) return null;

  let clean = value.split(" ")[0];
  let parts = clean.split("/");

  if(parts.length !== 3) return null;

  return new Date(parts[2], parts[1]-1, parts[0]);
}

// SAFE GET
function getValue(row, key){
  let foundKey = Object.keys(row).find(k => k.trim() === key);
  return foundKey ? row[foundKey] : "";
}

// BACK
function goHome(){
  window.location.href = "index.html";
}

// PRINT
function printReport(){
  window.print();
}

function loadReport(){

  let fromVal = document.getElementById("fromDate").value;
  let toVal = document.getElementById("toDate").value;

  let nameSearch = document.getElementById("nameSearch").value.toLowerCase();
  let amountSearch = document.getElementById("amountSearch").value;

  let from = convertInputDate(fromVal);
  let to = convertInputDate(toVal);

  if(to){
    to.setHours(23,59,59,999);
  }

  fetch(API)
  .then(res => res.json())
  .then(data => {

    let rangeText = "";

    if(fromVal && toVal){
      rangeText = `
        <div class="range">
          Date Range: ${formatDisplayDate(fromVal)} to ${formatDisplayDate(toVal)}
        </div>
      `;
    }

    let html = rangeText + `
      <table>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Amount</th>
          <th>Mode</th>
        </tr>
    `;

    let total = 0;
    let count = 0;

    data.forEach(row => {

      let dateStr = getValue(row, "Payment Date");
      let d = parseDate(dateStr);

      if(!d) return;

      // DATE FILTER
      if(from && to){
        if(d < from || d > to) return;
      }

      // NAME FILTER
      let name = getValue(row,"Person Name").toLowerCase();
      if(nameSearch && !name.includes(nameSearch)) return;

      // AMOUNT FILTER
      let amt = Number(getValue(row,"Amount")) || 0;
      if(amountSearch && amt != amountSearch) return;

      total += amt;
      count++;

      html += `
      <tr>
        <td>${dateStr.split(" ")[0]}</td>
        <td>${getValue(row,"Person Name")}</td>
        <td>₹${amt}</td>
        <td>${getValue(row,"Mode")}</td>
      </tr>`;
    });

    html += "</table>";

    if(count === 0){
      document.getElementById("result").innerHTML =
        "<div class='nodata'>❌ No Data Found</div>";
      return;
    }

    html += `<div class="total">Total Amount: ₹${total}</div>`;

    document.getElementById("result").innerHTML = html;
  });
}
</script>

</body>
</html>
