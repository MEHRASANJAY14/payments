<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #1c3c75, #3f63b5, #00c6ff);
  background-size: 400% 400%;
  animation: gradient 8s ease infinite;
}

@keyframes gradient {
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

.header {
  text-align:center;
  color:#fff;
  padding:15px;
}

.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  margin:20px auto;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:20px;
}

.input-box {
  margin:12px 0;
}

input, select {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1c3c75;
  color:#fff;
  font-weight:bold;
  margin-top:10px;
}

.loading {
  display:none;
  text-align:center;
  margin-top:10px;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">
  <h2>💸 Add Payment</h2>
</div>

<div class="container">

  <form id="form">

    <div class="input-box">
      <input type="text" name="person_name" placeholder="Person Name" required>
    </div>

    <div class="input-box">
      <input type="number" name="amount" placeholder="Amount" required>
    </div>

    <div class="input-box">
      <select name="mode">
        <option>Cash</option>
        <option>UPI</option>
        <option>Bank</option>
        <option>Cheque</option>
      </select>
    </div>

    <div class="input-box">
      <input type="text" name="purpose" placeholder="Purpose" required>
    </div>

    <!-- ✅ Receiver Type Added -->
    <div class="input-box">
      <select name="receiver_type">
        <option value="">Receiver Type</option>
        <option>Vendor</option>
        <option>Employee</option>
        <option>Self</option>
        <option>Other</option>
      </select>
    </div>

    <div class="input-box">
      <input type="text" name="remarks" placeholder="Remarks">
    </div>

    <button type="submit" id="btn">Save Payment</button>

    <div class="loading" id="loading">Saving...</div>

  </form>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("loading").style.display = "block";
  document.getElementById("btn").innerText = "Saving...";

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("btn").innerText = "Save Payment";

    try {
      let result = JSON.parse(res);

      alert("✅ Saved\nTxn ID: " + result.txn);

      window.location.href = "receipt.html?id=" + result.txn;

    } catch {
      alert("Saved but response issue");
    }

    document.getElementById("form").reset();
  })
  .catch(err => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("btn").innerText = "Save Payment";
    alert("Error: " + err);
  });
});
</script>

</body>
</html>
