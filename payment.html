<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1c3c75, #3f63b5);
}

/* HEADER */
.header {
  text-align:center;
  color:#fff;
  padding:15px;
}

/* CARD */
.container {
  background:#fff;
  margin:20px auto;
  padding:20px;
  width:90%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* GRID */
.form-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
}

.full { grid-column: span 2; }

/* INPUT */
input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

/* ERROR */
.error {
  border:2px solid red;
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

.save-btn {
  background:#1c3c75;
  color:#fff;
}

.save-btn:hover {
  background:#0f2a5f;
}

.back-btn {
  background:#ccc;
  color:#000;
}

.back-btn:hover {
  background:#aaa;
}

/* SUCCESS */
.success-box {
  display:none;
  background:#4CAF50;
  color:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
}

/* LOADING */
.loading {
  display:none;
  text-align:center;
  margin-top:10px;
  color:#1c3c75;
}
</style>
</head>

<body>

<div class="header">
  <h2>💸 Add Payment</h2>
</div>

<div class="container">

  <div id="successBox" class="success-box"></div>

  <form id="form" class="form-grid">

    <!-- PAYMENT DATE -->
    <input type="date" name="payment_date" id="payment_date" class="full" required>

    <input type="text" name="person_name" placeholder="Person Name" class="full" required>

    <input type="number" name="amount" placeholder="Amount" required>

    <select name="mode" required>
      <option value="">Mode</option>
      <option>Cash</option>
      <option>UPI</option>
      <option>Bank</option>
      <option>Cheque</option>
    </select>

    <input type="text" name="purpose" placeholder="Purpose" class="full" required>

    <select name="receiver_type" required>
      <option value="">Receiver Type</option>
      <option>Vendor</option>
      <option>Employee</option>
      <option>Self</option>
      <option>Other</option>
    </select>

    <input type="text" name="remarks" placeholder="Remarks (optional)">

    <!-- SAVE -->
    <div class="full">
      <button type="submit" class="btn save-btn" id="btn">Save Payment</button>
    </div>

    <!-- BACK -->
    <div class="full">
      <button type="button" class="btn back-btn" onclick="goHome()">⬅ Back to Home</button>
    </div>

    <div class="loading full" id="loading">Saving...</div>

  </form>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

// AUTO TODAY DATE
window.onload = function(){
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("payment_date").value = today;
};

// BACK
function goHome(){
  window.location.href = "index.html";
}

const form = document.getElementById("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  let valid = true;

  form.querySelectorAll("input, select").forEach(el => {
    el.classList.remove("error");

    if(el.hasAttribute("required") && !el.value.trim()){
      el.classList.add("error");
      valid = false;
    }
  });

  if(!valid){
    alert("⚠️ Please fill all required fields");
    return;
  }

  document.getElementById("loading").style.display = "block";
  document.getElementById("btn").innerText = "Saving...";

  let data = Object.fromEntries(new FormData(form).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("btn").innerText = "Save Payment";

    let result = JSON.parse(res);

    let box = document.getElementById("successBox");
    box.style.display = "block";
    box.innerHTML = "✅ Payment Saved<br>Txn ID: <b>" + result.txn + "</b>";

    setTimeout(() => {
      window.location.href = "receipt.html?id=" + result.txn;
    }, 4000);

    form.reset();

    // reset date again
    let today = new Date().toISOString().split('T')[0];
    document.getElementById("payment_date").value = today;
  })
  .catch(err => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("btn").innerText = "Save Payment";
    alert("❌ Error: " + err);
  });
});
</script>

</body>
</html>
