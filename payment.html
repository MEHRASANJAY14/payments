<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1c3c75, #3f63b5, #00c6ff);
}

/* HEADER */
.header {
  text-align:center;
  color:#fff;
  padding:18px;
  font-size:18px;
  font-weight:bold;
}

/* CARD */
.container {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  margin:20px auto;
  padding:25px;
  width:92%;
  max-width:520px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* FORM ROW */
.form-row {
  display:flex;
  align-items:center;
  margin-bottom:14px;
}

/* LABEL */
.form-row label {
  width:40%;
  font-weight:600;
  color:#fff;
  font-size:14px;
}

/* INPUT */
.form-row input,
.form-row select {
  width:60%;
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:14px;
  transition:0.3s;
}

/* FOCUS EFFECT */
.form-row input:focus,
.form-row select:focus {
  box-shadow:0 0 5px #00c6ff;
  transform:scale(1.02);
}

/* BUTTON */
.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
  transition:0.3s;
}

.save-btn {
  background:#00c6ff;
  color:#fff;
}

.save-btn:hover {
  background:#009edc;
  transform:scale(1.03);
}

.back-btn {
  background:#ddd;
}

.back-btn:hover {
  background:#bbb;
}

/* SUCCESS */
.success-box {
  display:none;
  background:#28a745;
  color:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
}

/* MOBILE */
@media(max-width:500px){
  .form-row {
    flex-direction:column;
    align-items:flex-start;
  }

  .form-row label {
    width:100%;
    margin-bottom:5px;
  }

  .form-row input,
  .form-row select {
    width:100%;
  }
}
</style>
</head>

<body>

<div class="header">💸 Add Payment</div>

<div class="container">

  <div id="successBox" class="success-box"></div>

  <form id="form">

    <div class="form-row">
      <label>Payment Date</label>
      <input type="date" name="payment_date" id="payment_date" required>
    </div>

    <div class="form-row">
      <label>Person Name</label>
      <input type="text" name="person_name" required>
    </div>

    <div class="form-row">
      <label>Amount</label>
      <input type="number" name="amount" required>
    </div>

    <div class="form-row">
      <label>Mode</label>
      <select name="mode" required>
        <option value="">Select</option>
        <option>Cash</option>
        <option>UPI</option>
        <option>Bank</option>
        <option>Cheque</option>
      </select>
    </div>

    <div class="form-row">
      <label>Purpose</label>
      <input type="text" name="purpose" required>
    </div>

    <div class="form-row">
      <label>Receiver Type</label>
      <select name="receiver_type" required>
        <option value="">Select</option>
        <option>Vendor</option>
        <option>Employee</option>
        <option>Self</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-row">
      <label>Remarks</label>
      <input type="text" name="remarks">
    </div>

    <button type="submit" class="btn save-btn" id="btn">Save Payment</button>
    <button type="button" class="btn back-btn" onclick="goHome()">⬅ Back</button>

  </form>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

// Auto date
window.onload = function(){
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("payment_date").value = today;
};

// Back
function goHome(){
  window.location.href = "index.html";
}

// Submit
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("btn").innerText = "Saving...";

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    let result = JSON.parse(res);

    let box = document.getElementById("successBox");
    box.style.display = "block";
    box.innerHTML = "✅ Saved<br>Txn ID: <b>" + result.txn + "</b>";

    document.getElementById("btn").innerText = "Save Payment";

    setTimeout(() => {
      window.location.href = "receipt.html?id=" + result.txn;
    }, 4000);

    document.getElementById("form").reset();

    let today = new Date().toISOString().split('T')[0];
    document.getElementById("payment_date").value = today;
  });
});
</script>

</body>
</html>
