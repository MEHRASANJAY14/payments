<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1c3c75, #3f63b5);
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:15px;
}

.header h2 {
  margin:0;
  font-size:18px;
}

/* FORM CARD */
.container {
  background:#fff;
  color:#333;
  margin:20px auto;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

input, select {
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1c3c75;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#0f2a5f;
}

/* LOADING */
.loading {
  display:none;
  text-align:center;
  margin-top:10px;
  font-size:14px;
  color:#1c3c75;
}

/* FOOTER */
.footer {
  text-align:center;
  margin-top:20px;
}

.back {
  color:#fff;
  text-decoration:none;
  font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>💸 Add Payment</h2>
</div>

<!-- FORM -->
<div class="container">

  <form id="form">

    <input type="text" name="person_name" placeholder="Person Name" required>

    <input type="number" name="amount" placeholder="Amount" required>

    <select name="mode">
      <option>Cash</option>
      <option>UPI</option>
      <option>Bank</option>
      <option>Cheque</option>
    </select>

    <input type="text" name="purpose" placeholder="Purpose" required>

    <input type="text" name="remarks" placeholder="Remarks">

    <button type="submit">Save Payment</button>

    <div class="loading" id="loading">Saving...</div>

  </form>

</div>

<!-- FOOTER -->
<div class="footer">
  <a href="index.html" class="back">⬅ Back to Home</a>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("loading").style.display = "block";

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("loading").style.display = "none";

    try {
      let result = JSON.parse(res);

      alert("✅ Payment Saved\nTxn ID: " + result.txn);

      // Redirect to receipt
      window.location.href = "receipt.html?id=" + result.txn;

    } catch(err) {
      alert("Saved but response issue ⚠️");
    }

    document.getElementById("form").reset();
  })
  .catch(err => {
    document.getElementById("loading").style.display = "none";
    alert("❌ Error: " + err);
  });
});
</script>

</body>
</html>
