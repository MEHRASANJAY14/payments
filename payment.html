<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1c3c75, #3f63b5);
}

/* HEADER */
.header {
  text-align:center;
  color:#fff;
  padding:18px;
  font-size:18px;
  font-weight:bold;
}

/* CONTAINER */
.container {
  background:#ffffff15;
  backdrop-filter: blur(12px);
  margin:15px auto;
  padding:20px;
  width:92%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* FORM GRID */
.form {
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* FIELD */
.field {
  display:flex;
  flex-direction:column;
}

.field label {
  color:#fff;
  font-size:13px;
  margin-bottom:4px;
}

/* INPUT */
.field input,
.field select {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;
  background:#fff;
}

/* BUTTON */
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  margin-top:5px;
}

.save-btn {
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color:#fff;
}

.back-btn {
  background:#eee;
}

/* SUCCESS */
.success-box {
  display:none;
  background:#28a745;
  color:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">💸 Add Payment</div>

<div class="container">

  <div id="successBox" class="success-box"></div>

  <form id="form" class="form">

    <!-- DISPLAY DATE -->
    <div class="field">
      <label>Payment Date</label>
      <input type="text" id="display_date" readonly onclick="openPicker()">
      <input type="date" id="payment_date" name="payment_date" style="display:none;">
    </div>

    <div class="field">
      <label>Person Name</label>
      <input type="text" name="person_name" required>
    </div>

    <div class="field">
      <label>Amount</label>
      <input type="number" name="amount" required>
    </div>

    <div class="field">
      <label>Mode</label>
      <select name="mode" required>
        <option value="">Select</option>
        <option>Cash</option>
        <option>UPI</option>
        <option>Bank</option>
        <option>Cheque</option>
      </select>
    </div>

    <div class="field">
      <label>Purpose</label>
      <input type="text" name="purpose" required>
    </div>

    <div class="field">
      <label>Receiver Type</label>
      <select name="receiver_type" required>
        <option value="">Select</option>
        <option>Vendor</option>
        <option>Employee</option>
        <option>Self</option>
        <option>Other</option>
      </select>
    </div>

    <div class="field">
      <label>Remarks</label>
      <input type="text" name="remarks">
    </div>

    <button type="submit" class="btn save-btn" id="btn">Save Payment</button>
    <button type="button" class="btn back-btn" onclick="goHome()">⬅ Back</button>

  </form>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

// FORMAT DATE → 01-Apr-2026
function formatDate(d){
  let date = new Date(d);
  let day = String(date.getDate()).padStart(2,'0');
  let month = date.toLocaleString('en-IN', { month: 'short' });
  let year = date.getFullYear();
  return `${day}-${month}-${year}`;
}

// AUTO SET TODAY
window.onload = function(){
  let today = new Date();
  let iso = today.toISOString().split('T')[0];

  document.getElementById("payment_date").value = iso;
  document.getElementById("display_date").value = formatDate(today);
};

// OPEN DATE PICKER
function openPicker(){
  document.getElementById("payment_date").showPicker();
}

// UPDATE DISPLAY DATE
document.getElementById("payment_date").addEventListener("change", function(){
  document.getElementById("display_date").value = formatDate(this.value);
});

// BACK
function goHome(){
  window.location.href = "index.html";
}

// SUBMIT
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("btn").innerText = "Saving...";

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    let result = JSON.parse(res);

    let box = document.getElementById("successBox");
    box.style.display = "block";
    box.innerHTML = "✅ Saved<br>Txn ID: <b>" + result.txn + "</b>";

    document.getElementById("btn").innerText = "Save Payment";

    setTimeout(() => {
      window.location.href = "receipt.html?id=" + result.txn;
    }, 4000);

    document.getElementById("form").reset();
  });
});
</script>

</body>
</html>
