<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1c3c75, #3f63b5);
}

.header {
  text-align:center;
  color:#fff;
  padding:15px;
}

.container {
  background:#fff;
  margin:20px auto;
  padding:20px;
  width:90%;
  max-width:420px;
  border-radius:20px;
}

.form-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
}

.full { grid-column: span 2; }

input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1c3c75;
  color:#fff;
}

.loading {
  display:none;
  text-align:center;
  margin-top:10px;
}

.success-box {
  display:none;
  background:#4CAF50;
  color:#fff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="header">
  <h2>💸 Add Payment</h2>
</div>

<div class="container">

  <div id="successBox" class="success-box"></div>

  <form id="form" class="form-grid">

    <input type="text" name="person_name" placeholder="Person Name" class="full" required>

    <input type="number" name="amount" placeholder="Amount" required>

    <select name="mode" required>
      <option value="">Mode</option>
      <option>Cash</option>
      <option>UPI</option>
      <option>Bank</option>
      <option>Cheque</option>
    </select>

    <input type="text" name="purpose" placeholder="Purpose" class="full" required>

    <select name="receiver_type" required>
      <option value="">Receiver Type</option>
      <option>Vendor</option>
      <option>Employee</option>
      <option>Self</option>
      <option>Other</option>
    </select>

    <input type="text" name="remarks" placeholder="Remarks (optional)">

    <div class="full">
      <button type="submit" id="btn">Save Payment</button>
    </div>

    <div class="loading full" id="loading">Saving...</div>

  </form>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

const form = document.getElementById("form");

form.addEventListener("submit", function(e){
  e.preventDefault();

  let valid = true;

  form.querySelectorAll("input, select").forEach(el => {
    el.style.border = "1px solid #ccc";
    if(el.hasAttribute("required") && !el.value.trim()){
      el.style.border = "2px solid red";
      valid = false;
    }
  });

  if(!valid){
    alert("⚠️ Fill all required fields");
    return;
  }

  document.getElementById("loading").style.display = "block";
  document.getElementById("btn").innerText = "Saving...";

  let data = Object.fromEntries(new FormData(form).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("btn").innerText = "Save Payment";

    let result = JSON.parse(res);

    let box = document.getElementById("successBox");
    box.style.display = "block";
    box.innerHTML = "✅ Saved<br>Txn ID: <b>" + result.txn + "</b>";

    // Delay for receipt fix
    setTimeout(() => {
      window.location.href = "receipt.html?id=" + result.txn;
    }, 4000);

    form.reset();
  })
  .catch(err => {
    alert("Error: " + err);
  });
});
</script>

</body>
</html>
