<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1c3c75, #3f63b5);
}

/* HEADER */
.header {
  text-align:center;
  color:#fff;
  padding:15px;
}

/* CARD */
.container {
  background:#fff;
  margin:20px auto;
  padding:20px;
  width:90%;
  max-width:420px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* GRID FORM */
.form-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px;
}

/* FULL WIDTH */
.full {
  grid-column: span 2;
}

/* INPUT */
input, select {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
  box-sizing:border-box;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1c3c75;
  color:#fff;
  font-weight:bold;
  margin-top:10px;
}

.loading {
  display:none;
  text-align:center;
  margin-top:10px;
  color:#1c3c75;
}

/* FOOTER */
.footer {
  text-align:center;
  margin-top:15px;
}

.footer a {
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
  <h2>💸 Add Payment</h2>
</div>

<div class="container">

  <form id="form" class="form-grid">

    <input type="text" name="person_name" placeholder="Person Name" class="full" required>

    <input type="number" name="amount" placeholder="Amount" required>

    <select name="mode">
      <option>Cash</option>
      <option>UPI</option>
      <option>Bank</option>
      <option>Cheque</option>
    </select>

    <input type="text" name="purpose" placeholder="Purpose" class="full" required>

    <select name="receiver_type">
      <option value="">Receiver Type</option>
      <option>Vendor</option>
      <option>Employee</option>
      <option>Self</option>
      <option>Other</option>
    </select>

    <input type="text" name="remarks" placeholder="Remarks">

    <div class="full">
      <button type="submit" id="btn">Save Payment</button>
    </div>

    <div class="loading full" id="loading">Saving...</div>

  </form>

</div>

<div class="footer">
  <a href="index.html">⬅ Back to Home</a>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("loading").style.display = "block";
  document.getElementById("btn").innerText = "Saving...";

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("btn").innerText = "Save Payment";

    try {
      let result = JSON.parse(res);
      alert("✅ Saved\nTxn ID: " + result.txn);
      window.location.href = "receipt.html?id=" + result.txn;
    } catch {
      alert("Saved but response issue");
    }

    document.getElementById("form").reset();
  })
  .catch(err => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("btn").innerText = "Save Payment";
    alert("Error: " + err);
  });
});
</script>

</body>
</html>
