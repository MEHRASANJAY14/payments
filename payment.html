<!DOCTYPE html>
<html>
<body>

<h2>Add Payment</h2>

<form id="form">
  <input type="text" name="account_no" placeholder="Account No" required><br><br>
  <input type="number" name="amount" placeholder="Amount" required><br><br>

  <select name="mode">
    <option>Cash</option>
    <option>UPI</option>
    <option>Bank</option>
  </select><br><br>

  <select name="purpose">
    <option>EMI</option>
    <option>Loan Payment</option>
  </select><br><br>

  <input type="text" name="remarks" placeholder="Remarks"><br><br>

  <button type="submit">Save Payment</button>
</form>

<br><a href="index.html">⬅ Back</a>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(msg => {
    alert("Payment Saved ✅");
    this.reset();
  });
});
</script>

</body>
</html>
