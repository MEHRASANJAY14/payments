<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1c3c75, #3f63b5);
}

/* HEADER */
.header {
  text-align:center;
  color:#fff;
  padding:18px;
  font-size:18px;
  font-weight:bold;
}

/* CONTAINER */
.container {
  background:#ffffff;
  margin:20px auto;
  padding:20px;
  width:92%;
  max-width:500px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* FORM ROW */
.form-row {
  display:flex;
  align-items:center;
  margin-bottom:14px;
}

/* LABEL */
.form-row label {
  width:150px;
  min-width:150px;
  font-size:14px;
  font-weight:600;
  color:#333;
}

/* INPUT */
.form-row input,
.form-row select {
  flex:1;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

/* BUTTON */
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.save-btn {
  background:#1c3c75;
  color:#fff;
}

.back-btn {
  background:#ddd;
}

/* MOBILE */
@media(max-width:500px){
  .form-row {
    flex-direction:column;
    align-items:stretch;
  }

  .form-row label {
    width:100%;
    margin-bottom:5px;
  }
}
</style>
</head>

<body>

<div class="header">💸 Add Payment</div>

<div class="container">

  <form id="form">

    <div class="form-row">
      <label>Payment Date</label>
      <input type="date" name="payment_date" id="payment_date" required>
    </div>

    <div class="form-row">
      <label>Person Name</label>
      <input type="text" name="person_name" required>
    </div>

    <div class="form-row">
      <label>Amount</label>
      <input type="number" name="amount" required>
    </div>

    <div class="form-row">
      <label>Mode</label>
      <select name="mode" required>
        <option value="">Select</option>
        <option>Cash</option>
        <option>UPI</option>
        <option>Bank</option>
        <option>Cheque</option>
      </select>
    </div>

    <div class="form-row">
      <label>Purpose</label>
      <input type="text" name="purpose" required>
    </div>

    <div class="form-row">
      <label>Receiver Type</label>
      <select name="receiver_type" required>
        <option value="">Select</option>
        <option>Vendor</option>
        <option>Employee</option>
        <option>Self</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-row">
      <label>Remarks</label>
      <input type="text" name="remarks">
    </div>

    <button type="submit" class="btn save-btn" id="btn">Save Payment</button>
    <button type="button" class="btn back-btn" onclick="goHome()">⬅ Back</button>

  </form>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

// AUTO TODAY DATE
window.onload = function(){
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("payment_date").value = today;
};

// BACK BUTTON
function goHome(){
  window.location.href = "index.html";
}

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let btn = document.getElementById("btn");
  btn.innerText = "Saving...";

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    let result = JSON.parse(res);

    alert("✅ Payment Saved\nTxn ID: " + result.txn);

    setTimeout(() => {
      window.location.href = "receipt.html?id=" + result.txn;
    }, 3000);

    this.reset();

    let today = new Date().toISOString().split('T')[0];
    document.getElementById("payment_date").value = today;

    btn.innerText = "Save Payment";
  })
  .catch(err => {
    alert("❌ Error: " + err);
    btn.innerText = "Save Payment";
  });
});
</script>

</body>
</html>
