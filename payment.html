<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Payment</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1c3c75, #3f63b5);
}

/* HEADER */
.header {
  text-align:center;
  color:#fff;
  padding:18px;
  font-size:18px;
  font-weight:bold;
}

/* CONTAINER */
.container {
  background:#ffffff15;
  backdrop-filter: blur(12px);
  margin:15px auto;
  padding:20px;
  width:92%;
  max-width:500px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* ROW ALIGNMENT */
.form-row {
  display:grid;
  grid-template-columns: 40% 60%;
  align-items:center;
  margin-bottom:14px;
  gap:10px;
}

/* LABEL */
.form-row label {
  color:#fff;
  font-size:14px;
  font-weight:600;
}

/* INPUT */
.form-row input,
.form-row select {
  width:100%;
  padding:11px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:14px;
}

/* BUTTON */
.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.save-btn {
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color:#fff;
}

.back-btn {
  background:#eee;
}

/* SUCCESS */
.success-box {
  display:none;
  background:#28a745;
  color:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* MOBILE FIX */
@media(max-width:500px){
  .form-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="header">💸 Add Payment</div>

<div class="container">

  <div id="successBox" class="success-box"></div>

  <form id="form">

    <div class="form-row">
      <label>Payment Date</label>
      <input type="date" name="payment_date" id="payment_date" required>
    </div>

    <div class="form-row">
      <label>Person Name</label>
      <input type="text" name="person_name" required>
    </div>

    <div class="form-row">
      <label>Amount</label>
      <input type="number" name="amount" required>
    </div>

    <div class="form-row">
      <label>Mode</label>
      <select name="mode" required>
        <option value="">Select</option>
        <option>Cash</option>
        <option>UPI</option>
        <option>Bank</option>
        <option>Cheque</option>
      </select>
    </div>

    <div class="form-row">
      <label>Purpose</label>
      <input type="text" name="purpose" required>
    </div>

    <div class="form-row">
      <label>Receiver Type</label>
      <select name="receiver_type" required>
        <option value="">Select</option>
        <option>Vendor</option>
        <option>Employee</option>
        <option>Self</option>
        <option>Other</option>
      </select>
    </div>

    <div class="form-row">
      <label>Remarks</label>
      <input type="text" name="remarks">
    </div>

    <button type="submit" class="btn save-btn" id="btn">Save Payment</button>
    <button type="button" class="btn back-btn" onclick="goHome()">⬅ Back</button>

  </form>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

// Auto date
window.onload = function(){
  let today = new Date().toISOString().split('T')[0];
  document.getElementById("payment_date").value = today;
};

// Back
function goHome(){
  window.location.href = "index.html";
}

// Submit
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  document.getElementById("btn").innerText = "Saving...";

  let data = Object.fromEntries(new FormData(this).entries());

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(res => {
    let result = JSON.parse(res);

    document.getElementById("successBox").style.display = "block";
    document.getElementById("successBox").innerHTML =
      "✅ Saved<br>Txn ID: <b>" + result.txn + "</b>";

    document.getElementById("btn").innerText = "Save Payment";

    setTimeout(() => {
      window.location.href = "receipt.html?id=" + result.txn;
    }, 4000);

    this.reset();

    let today = new Date().toISOString().split('T')[0];
    document.getElementById("payment_date").value = today;
  });
});
</script>

</body>
</html>
