<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Customer</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* MAIN CARD */
.container {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  color:white;
}

/* TITLE */
h2 {
  text-align:center;
  margin-bottom:20px;
}

/* INPUTS */
input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:14px;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:#0072ff;
}

/* BACK BUTTON */
.back {
  display:block;
  text-align:center;
  margin-top:15px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

  <h2>👤 Add Customer</h2>

  <form id="form">
    <input type="text" name="name" placeholder="Customer Name" required>
    <input type="text" name="account_no" placeholder="Account No" required>
    <input type="text" name="mobile" placeholder="Mobile">
    <input type="text" name="address" placeholder="Address">
    <input type="number" name="loan_amount" placeholder="Loan Amount">

    <button type="submit">Save Customer</button>
  </form>

  <a href="index.html" class="back">⬅ Back to Home</a>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let data = Object.fromEntries(new FormData(this).entries());
  data.type = "customer";

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(msg => {
    alert("Customer Saved ✅");
    this.reset();
  });
});
</script>

</body>
</html>
