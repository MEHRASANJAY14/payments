<!DOCTYPE html>
<html>
<body>

<h2>Add Customer</h2>

<form id="form">
  <input type="text" name="name" placeholder="Name" required><br><br>
  <input type="text" name="account_no" placeholder="Account No" required><br><br>
  <input type="text" name="mobile" placeholder="Mobile"><br><br>
  <input type="text" name="address" placeholder="Address"><br><br>
  <input type="number" name="loan_amount" placeholder="Loan Amount"><br><br>

  <button type="submit">Save</button>
</form>

<br><a href="index.html">⬅ Back</a>

<script>
const API = "https://script.google.com/macros/s/AKfycbwVdZs7juFLr9FHL3cMxNZs2VhzVv5wegm4IvIsyZ0uI8qD08kfqBH95YXzTxRIRri_/exec";

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let data = Object.fromEntries(new FormData(this).entries());
  data.type = "customer";

  fetch(API, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(msg => {
    alert("Customer Saved ✅");
    this.reset();
  });
});
</script>

</body>
</html>
